<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4 bg-secondary" style="width: 350px;">

            <h2 class="text-center mb-4 text-white">Calculator</h2>

            <div class="mb-3">
                <label class="form-label text-white">Value 1</label>
                <input type="number" id="value1" class="form-control" placeholder="Enter first number">
            </div>

            <div class="mb-3">
                <label class="form-label text-white">Value 2</label>
                <input type="number" id="value2" class="form-control" placeholder="Enter second number">
            </div>

            <div class="d-grid gap-2">

                <button class="btn btn-dark" onclick="add()">Add</button>

                <button class="btn btn-dark " onclick="subtract()">Subtract</button>

                <button class="btn btn-dark " onclick="multiply()">Multiply</button>

                <button class="btn btn-dark " onclick="division()">Division</button>
                
                <button class="btn btn-dark " onclick="modulus()">Modulus</button>
                
            </div>

            <div class="mt-4">
                <h5 class="text-white">Result</h5>
                <div id="getValue" class="border rounded pt-2 pb-2 ps-2 bg-light">0</div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
